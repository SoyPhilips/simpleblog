<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Blog - Publicaciones</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>Blog Simple</h1>
  </header>

  <main class="container">
    <section class="editor">
      <h2>Crear / Editar publicación</h2>
      <form id="postForm">
        <input type="hidden" id="postId" />
        <label>
          <span>Título</span>
          <input id="title" required maxlength="100" />
        </label>
        <label>
          <span>Contenido</span>
          <textarea id="content" required rows="6" maxlength="2000"></textarea>
        </label>
        <div class="form-actions">
          <button type="submit" id="saveBtn">Guardar</button>
          <button type="button" id="cancelBtn">Cancelar</button>
        </div>
      </form>
    </section>

    <section class="posts">
      <h2>Publicaciones</h2>
      <div id="postsList" class="posts-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <small>Proyecto educativo - Blog Simple</small>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
